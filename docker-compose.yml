version: '3.8'

services:
  app:
    build: .
    container_name: ai-studio-applet
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - SQLITE_URL=file:/app/prisma/data/prod.db
      - NEXT_PUBLIC_GEMINI_API_KEY=${NEXT_PUBLIC_GEMINI_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - sqlite_data:/app/prisma/data

volumes:
  sqlite_data:
